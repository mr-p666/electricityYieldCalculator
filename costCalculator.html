<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Pro Storage Calc v1.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #020617; font-family: 'Inter', sans-serif; }
        .input-card { background: #1e293b; padding: 1.25rem; border-radius: 1rem; border: 1px solid #334155; flex: 1 1 calc(50% - 1rem); min-width: 300px; }
        label { color: #60a5fa; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; display: block; }
        .field-row { display: flex; gap: 1rem; margin-bottom: 0.75rem; align-items: flex-end; }
        .input-unit-group { flex: 1; display: flex; flex-direction: column; }
        input, select { background-color: #0f172a; border: 1px solid #475569; color: white; padding: 0.6rem; border-radius: 0.5rem; font-size: 0.9rem; outline: none; width: 100%; }
        .hint { color: #64748b; font-size: 0.65rem; margin-top: 0.25rem; }
    </style>
</head>
<body class="text-slate-100 p-4 md:p-10">

    <div class="max-w-7xl mx-auto bg-slate-900/40 p-6 md:p-8 rounded-[2rem] border border-slate-800 shadow-2xl">
        <h1 class="text-3xl font-black mb-10 text-white flex items-center gap-4">
            <span class="bg-blue-600 p-2 rounded-lg text-white">⚡</span> Speicher-Gewinn-Rechner
        </h1>

        <div class="flex flex-wrap gap-4 mb-4">
            <div class="input-card">
                <label>Netz & Steuer</label>
                <div class="field-row">
                    <div class="input-unit-group"><input type="number" id="gridFees" value="10.5" step="0.1"><span class="hint">Netz ct/kWh</span></div>
                    <div class="input-unit-group"><input type="number" id="taxRate" value="20" step="1"><span class="hint">MwSt %</span></div>
                </div>
            </div>
            <div class="input-card">
                <label>Batterie & Verschlei&szlig;</label>
                <div class="field-row">
                    <div class="input-unit-group"><input type="number" id="efficiency" value="85"><span class="hint">Effizienz %</span></div>
                    <div class="input-unit-group"><input type="number" id="wear" value="4.0" step="0.5"><span class="hint">Abnutzung ct</span></div>
                </div>
            </div>
        </div>

        <div class="flex flex-wrap gap-4 mb-8">
            <div class="input-card border-blue-500/30">
                <label>Strombezug (Kauf)</label>
                <div class="flex gap-2">
                    <input type="number" id="buyMarginVal" value="1.2" step="0.1">
                    <select id="buyMarginType" class="w-24"><option value="fix">ct</option><option value="perc">%</option></select>
                </div>
                <span class="hint">Marge auf B&ouml;rsenpreis</span>
            </div>
            <div class="input-card border-green-500/30">
                <label>Einspeisung (Verkauf)</label>
                <div class="flex gap-2">
                    <input type="number" id="sellMarginVal" value="20" step="1">
                    <select id="sellMarginType" class="w-24"><option value="perc" selected>%</option><option value="fix">ct</option></select>
                </div>
                <span class="hint">H&auml;ndler-Abzug</span>
            </div>
        </div>

        <button onclick="calculate()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-2xl shadow-xl mb-10 uppercase tracking-widest transition-all">
            Berechnen & Werte speichern
        </button>

        <div class="bg-slate-950/60 p-6 rounded-[1.5rem] border border-slate-800 mb-10" style="height: 450px;">
            <canvas id="priceChart"></canvas>
        </div>

        <div class="overflow-hidden rounded-2xl border border-slate-800 bg-slate-900/20">
            <table class="w-full text-xs text-left" id="resultTable">
                <thead class="bg-slate-800/60 text-slate-400">
                    <tr>
                        <th class="p-4 uppercase tracking-widest">Datum / Zeit</th>
                        <th class="p-4 text-center">B&ouml;rse (ct)</th>
                        <th class="p-4 text-center text-red-400">Bezug (Total)</th>
                        <th class="p-4 text-center text-blue-400">Verkauf (Netto)</th>
                        <th class="p-4 text-right">Potenzial</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-800/50"></tbody>
            </table>
        </div>
    </div>

    <script>
        let myChart;

        function loadSettings() {
            const saved = localStorage.getItem('storageCalcSettings');
            if (saved) {
                const s = JSON.parse(saved);
                document.getElementById('gridFees').value = s.gridFees;
                document.getElementById('taxRate').value = s.taxRate;
                document.getElementById('efficiency').value = s.efficiency;
                document.getElementById('wear').value = s.wear;
                document.getElementById('buyMarginVal').value = s.buyMarginVal;
                document.getElementById('buyMarginType').value = s.buyMarginType;
                document.getElementById('sellMarginVal').value = s.sellMarginVal;
                document.getElementById('sellMarginType').value = s.sellMarginType;
            }
        }

        async function calculate() {
            const gridFees = parseFloat(document.getElementById('gridFees').value);
            const taxRate = parseFloat(document.getElementById('taxRate').value);
            const efficiency = parseFloat(document.getElementById('efficiency').value);
            const wear = parseFloat(document.getElementById('wear').value);
            const buyMarginVal = parseFloat(document.getElementById('buyMarginVal').value);
            const buyMarginType = document.getElementById('buyMarginType').value;
            const sellMarginVal = parseFloat(document.getElementById('sellMarginVal').value);
            const sellMarginType = document.getElementById('sellMarginType').value;

            localStorage.setItem('storageCalcSettings', JSON.stringify({
                gridFees, taxRate, efficiency, wear, buyMarginVal, buyMarginType, sellMarginVal, sellMarginType
            }));

            const tax = 1 + (taxRate / 100);
            const eff = efficiency / 100;

            const start = new Date();
            start.setHours(0,0,0,0);
            const end = new Date();
            end.setDate(end.getDate() + 1);
            end.setHours(23,59,59,999);

            try {
                const url = `https://api.awattar.at/v1/marketdata?start=${start.getTime()}&end=${end.getTime()}`;
                const response = await fetch(url);
                const result = await response.json();
                const now = new Date();
                
                const prices = result.data.map(d => {
                    const date = new Date(d.start_timestamp);
                    return {
                        timestamp: d.start_timestamp,
                        label: date.toLocaleDateString('de-DE', {day:'2-digit', month:'2-digit'}) + " " + date.getHours() + ":00",
                        rawPrice: d.marketprice / 10,
                        isNow: date.getHours() === now.getHours() && date.getDate() === now.getDate()
                    };
                });

                const calcBuy = (p) => ((p + (buyMarginType === 'fix' ? buyMarginVal : p * buyMarginVal/100) + gridFees) * tax) / eff;
                const calcSell = (p) => p - (sellMarginType === 'fix' ? sellMarginVal : p * sellMarginVal/100);

                const allBuy = prices.map(p => calcBuy(p.rawPrice));
                const minLoad = Math.min(...allBuy);

                if(myChart) myChart.destroy();
                myChart = new Chart(document.getElementById('priceChart'), {
                    type: 'line',
                    data: {
                        labels: prices.map(p => p.label),
                        datasets: [
                            { label: 'B&ouml;rsenpreis (ct)', data: prices.map(p => p.rawPrice), borderColor: '#3b82f6', tension: 0.3, pointRadius: prices.map(p => p.isNow ? 6 : 0), pointBackgroundColor: '#fff' },
                            { label: 'Bezugskosten (Laden)', data: allBuy, borderColor: '#f87171', borderDash: [5,5], tension: 0.3, pointRadius: 0 }
                        ]
                    },
                    options: { 
                        maintainAspectRatio: false, 
                        plugins: { legend: { labels: { color: '#94a3b8' } } },
                        scales: { 
                            y: { ticks: { color: '#64748b' }, grid: { color: '#1e293b' } }, 
                            x: { ticks: { color: '#64748b', maxRotation: 45, minRotation: 45 }, grid: { display: false } } 
                        }
                    }
                });

                const tbody = document.querySelector('#resultTable tbody');
                tbody.innerHTML = '';
                prices.forEach((p, i) => {
                    const sellVal = calcSell(p.rawPrice);
                    const profit = sellVal - minLoad - wear;
                    tbody.innerHTML += `
                        <tr class="${p.isNow ? 'bg-blue-600/30' : ''} ${profit > 0 ? 'bg-green-500/10' : ''} hover:bg-slate-800/40">
                            <td class="p-4 font-bold ${p.isNow ? 'text-white' : 'text-slate-500'}">${p.label} ${p.isNow ? '⬅️ AKTUELL' : ''}</td>
                            <td class="p-4 text-center font-mono">${p.rawPrice.toFixed(2)}</td>
                            <td class="p-4 text-center text-red-400 font-mono">${allBuy[i].toFixed(2)}</td>
                            <td class="p-4 text-center text-blue-400 font-mono">${sellVal.toFixed(2)}</td>
                            <td class="p-4 text-right font-black ${profit > 0 ? 'text-green-400' : 'text-slate-700'}">
                                ${profit > 0 ? '💰 +' + profit.toFixed(2) : '---'}
                            </td>
                        </tr>`;
                });
            } catch (e) { alert("Fehler beim Laden."); }
        }

        loadSettings();
        calculate();
    </script>
</body>
</html>
