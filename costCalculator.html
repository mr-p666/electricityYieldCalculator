<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Battery Profit Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 p-4 md:p-8">
    <div class="max-w-5xl mx-auto bg-slate-800 p-6 rounded-2xl shadow-2xl border border-slate-700">
        <h1 class="text-3xl font-extrabold mb-2 text-blue-400 text-center">🔋 Speicher-Gewinn-Rechner</h1>
        <p class="text-slate-400 text-center mb-8 text-sm">Berechnet Ladefenster & Profitabilität (basierend auf aWATTar API)</p>
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-slate-700 p-4 rounded-lg">
                <label class="block text-xs uppercase font-bold text-slate-400 mb-1">Netzgebühr (ct/kWh)</label>
                <input type="number" id="gridFees" value="10.5" step="0.1" class="w-full bg-slate-800 border border-slate-600 rounded p-2 outline-none focus:border-blue-500">
            </div>
            <div class="bg-slate-700 p-4 rounded-lg">
                <label class="block text-xs uppercase font-bold text-slate-400 mb-1">Effizienz (%)</label>
                <input type="number" id="efficiency" value="85" class="w-full bg-slate-800 border border-slate-600 rounded p-2 outline-none focus:border-blue-500">
            </div>
            <div class="bg-slate-700 p-4 rounded-lg">
                <label class="block text-xs uppercase font-bold text-slate-400 mb-1">Einspeise-Tarif (ct/kWh)</label>
                <input type="number" id="feedIn" value="7.0" class="w-full bg-slate-800 border border-slate-600 rounded p-2 outline-none focus:border-blue-500">
            </div>
            <div class="bg-slate-700 p-4 rounded-lg">
                <label class="block text-xs uppercase font-bold text-slate-400 mb-1 italic">Abnutzung (ct/kWh)</label>
                <input type="number" id="wear" value="4.0" step="0.5" class="w-full bg-slate-800 border border-slate-600 rounded p-2 outline-none focus:border-blue-500">
                <p class="text-[10px] text-slate-500 mt-1">Optional: Abnutzung des Akkus pro Ladung</p>
            </div>
        </div>

        <button onclick="calculate()" class="bg-blue-600 hover:bg-blue-500 transition-colors py-3 rounded-xl w-full font-bold mb-8 uppercase tracking-widest shadow-lg">Berechnen & Daten laden</button>

        <div class="bg-slate-700/50 p-4 rounded-xl mb-8 h-80">
            <canvas id="priceChart"></canvas>
        </div>

        <div class="overflow-hidden rounded-xl border border-slate-700">
            <table class="w-full text-sm text-left" id="resultTable">
                <thead class="bg-slate-700 text-slate-300 uppercase text-xs">
                    <tr>
                        <th class="p-3">Zeit</th>
                        <th class="p-3">Markt (ct)</th>
                        <th class="p-3">Ladekosten*</th>
                        <th class="p-3">Verkaufswert</th>
                        <th class="p-3">Netto-Profit**</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-700"></tbody>
            </table>
        </div>
        <p class="mt-4 text-xs text-slate-500">* Inkl. Netz & Effizienz | ** Inkl. Abnutzung & Einspeise-Alternative</p>
    </div>

    <script>
        let myChart;

        async function getMarketData() {
            const cacheKey = 'awattar_data';
            const cacheTimeKey = 'awattar_timestamp';
            const now = new Date().getTime();
            
            const cachedData = localStorage.getItem(cacheKey);
            const cachedTime = localStorage.getItem(cacheTimeKey);

            if (cachedData && cachedTime && (now - cachedTime < 3600000)) {
                console.log("Nutze Cache");
                return JSON.parse(cachedData);
            }

            try {
                const response = await fetch('https://api.awattar.at/v1/marketdata');
                const result = await response.json();
                localStorage.setItem(cacheKey, JSON.stringify(result.data));
                localStorage.setItem(cacheTimeKey, now.toString());
                return result.data;
            } catch (e) {
                alert("Fehler beim Laden der API-Daten");
                return [];
            }
        }

        async function calculate() {
            const gridFees = parseFloat(document.getElementById('gridFees').value);
            const eff = parseFloat(document.getElementById('efficiency').value) / 100;
            const wear = parseFloat(document.getElementById('wear').value);
            const feedIn = parseFloat(document.getElementById('feedIn').value);

            const rawData = await getMarketData();
            const prices = rawData.map(d => ({
                time: new Date(d.start_timestamp).getHours() + ":00",
                rawPrice: d.marketprice / 10
            })).slice(0, 24);

            const loadCosts = prices.map(p => (p.rawPrice + gridFees) / eff);
            const minLoadCost = Math.min(...loadCosts);

            updateChart(prices.map(p => p.time), prices.map(p => p.rawPrice), loadCosts);
            updateTable(prices, gridFees, eff, wear, minLoadCost, feedIn);
        }

        function updateChart(labels, market, load) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Börsenpreis', data: market, borderColor: '#60a5fa', tension: 0.3, fill: false },
                        { label: 'Deine Ladekosten', data: load, borderColor: '#f87171', borderDash: [5,5], tension: 0.3 }
                    ]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { labels: { color: '#94a3b8' } } } }
            });
        }

        function updateTable(prices, gridFees, eff, wear, minLoadCost, feedIn) {
            const tbody = document.querySelector('#resultTable tbody');
            tbody.innerHTML = '';
            
            prices.forEach((p, i) => {
                const currentLoadCost = (p.rawPrice + gridFees) / eff;
                const sellValue = p.rawPrice;
                
                const profit = sellValue - minLoadCost - wear;

                const row = `<tr class="hover:bg-slate-800 transition-colors">
                    <td class="p-3 border-b border-slate-700">${p.time}</td>
                    <td class="p-3 border-b border-slate-700">${p.rawPrice.toFixed(2)}</td>
                    <td class="p-3 border-b border-slate-700 text-slate-400">${currentLoadCost.toFixed(2)}</td>
                    <td class="p-3 border-b border-slate-700 font-mono">${sellValue.toFixed(2)}</td>
                    <td class="p-3 border-b border-slate-700 font-bold ${profit > 0 ? 'text-green-400' : 'text-slate-500'}">
                        ${profit > 0 ? '💰 +' + profit.toFixed(2) : '---'}
                    </td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }

        calculate();
    </script>
</body>
</html>
